<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalasag — Your Shield Against Gambling Harm | Philippines Recovery Platform</title>
    <meta name="description" content="Kalasag is the leading gambling recovery platform in the Philippines. Real crisis hotlines, PAGCOR self-exclusion links, blocking software, anonymous community, and evidence-based recovery tools. ₱499 one-time." />
    <meta name="keywords" content="gambling addiction, Philippines, anonymous support, crisis hotline, self-exclusion, recovery, Kalasag, anti-gambling, mental health" />
    <meta name="author" content="Rommel Andrei De Leon" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kalasag — Your Shield Against Gambling Harm" />
    <meta property="og:description" content="The leading gambling recovery platform in the Philippines. Real crisis hotlines, PAGCOR self-exclusion, blocking software, and anonymous community support." />
    <meta property="og:url" content="https://kalasag.vercel.app" />
    <meta property="og:site_name" content="Kalasag" />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_PH" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kalasag — Your Shield Against Gambling Harm" />
    <meta name="twitter:description" content="Philippines gambling recovery platform. Real hotlines, self-exclusion tools, and anonymous community." />
    <meta name="twitter:image" content="/og-image.svg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kalasag",
      "url": "https://kalasag.vercel.app",
      "logo": "https://kalasag.vercel.app/favicon.svg",
      "description": "Philippines gambling recovery platform with real crisis hotlines, PAGCOR self-exclusion, blocking software, and anonymous community support.",
      "sameAs": [
        "https://github.com/Kichiro23/Kalasag"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "PH"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Kalasag",
      "url": "https://kalasag.vercel.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://kalasag.vercel.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Theme -->
    <script>
      (function() {
        const theme = localStorage.getItem('kalasag-theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <style>
      #kalasag-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #f0f4f8;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      .dark #kalasag-preloader {
        background: #0f172a;
      }
      #kalasag-preloader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #kalasag-preloader .spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 3px solid rgba(13, 148, 136, 0.2);
        border-top-color: #0d9488;
        animation: kalasag-spin 0.8s linear infinite;
      }
      #kalasag-preloader .label {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        font-size: 14px;
        color: #4a5568;
        letter-spacing: 0.02em;
      }
      .dark #kalasag-preloader .label {
        color: #94a3b8;
      }
      @keyframes kalasag-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="kalasag-preloader">
      <div class="spinner"></div>
      <div class="label">Kalasag</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function() {
        const preloader = document.getElementById('kalasag-preloader');
        if (preloader) {
          setTimeout(function() {
            preloader.classList.add('hidden');
            setTimeout(function() {
              preloader.remove();
            }, 500);
          }, 300);
        }
      });
    </script>
  </body>
</html>
